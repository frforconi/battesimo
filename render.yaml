services:
  - type: web
    name: drive-gallery
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_REFRESH_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
